<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستشار المصاريف العصري</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 550px;
            transition: all 0.3s ease;
        }

        h2, h3 {
            text-align: center;
            margin-top: 0;
            letter-spacing: -0.5px;
        }

        h2 { color: #fff; margin-bottom: 25px; }
        h3 { color: var(--text-muted); font-size: 1.1rem; text-align: right; margin-top: 20px;}

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .hidden { display: none !important; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-title {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .text-success { color: var(--success); }
        .text-danger { color: var(--danger); }

        .expense-list {
            list-style: none;
            padding: 0;
            margin: 15px 0 0 0;
            max-height: 250px;
            overflow-y: auto;
        }

        .expense-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .expense-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .expense-name { font-weight: 500; }
        .expense-cost { color: var(--text-muted); font-size: 0.9rem; }

        .delete-btn {
            background: transparent;
            color: var(--text-muted);
            width: auto;
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .delete-btn:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            margin-top: 25px;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        hr { border: 0; border-top: 1px solid rgba(255, 255, 255, 0.1); margin: 25px 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-screen">
        <h2>بوابة الدخول الذكية</h2>
        <div class="form-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="أدخل اسمك">
        </div>
        <div class="form-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="handleAuth()">تسجيل الدخول / إنشاء حساب</button>
    </div>

    <div id="main-screen" class="hidden">
        <h2>أهلاً بك، <span id="user-display" style="color: var(--primary);"></span> ✨</h2>
        
        <div class="form-group">
            <label>إجمالي الدخل المتاح ({ الدخل })</label>
            <input type="number" id="income-input" placeholder="مثال: 5000" oninput="updateBudget()">
        </div>

        <hr>

        <h3>إضافة مصروف جديد</h3>
        <div class="form-group" style="display: grid; grid-template-columns: 2fr 1fr; gap: 10px;">
            <input type="text" id="item-name" placeholder="الصنف (تفاح، كهرباء...)">
            <input type="number" id="item-cost" placeholder="المبلغ">
        </div>
        <button onclick="addExpense()">إضافة إلى القائمة</button>

        <div class="dashboard-grid">
            <div class="stat-card">
                <div class="stat-title">إجمالي المصاريف</div>
                <div id="total-expenses" class="stat-value text-danger">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">المتبقي من الدخل</div>
                <div id="remaining-budget" class="stat-value text-success">0</div>
            </div>
        </div>

        <h3>المشتريات الحالية</h3>
        <ul id="expenses-container" class="expense-list"></ul>

        <button class="logout-btn" onclick="logout()">خروج آمن</button>
    </div>
</div>

<script>
    let currentUser = null;
    let userData = { income: 0, expenses: [] };

    window.onload = function() {
        const savedUser = localStorage.getItem('modern_curr_user');
        if (savedUser) {
            currentUser = savedUser;
            loadUserData();
            showMainScreen();
        }
    };

    function handleAuth() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();

        if (!user || !pass) {
            alert('الرجاء إدخال الاسم وكلمة المرور');
            return;
        }

        const existingAccount = localStorage.getItem(`user_${user}`);

        if (existingAccount) {
            const acc = JSON.parse(existingAccount);
            if (acc.password === pass) {
                currentUser = user;
            } else {
                alert('كلمة المرور غير صحيحة!');
                return;
            }
        } else {
            // إنشاء حساب جديد فارغ إذا لم يكن موجوداً مسبقاً
            const newAcc = { password: pass, income: 0, expenses: [] };
            localStorage.setItem(`user_${user}`, JSON.stringify(newAcc));
            currentUser = user;
        }

        localStorage.setItem('modern_curr_user', currentUser);
        loadUserData();
        showMainScreen();
    }

    function showMainScreen() {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText = currentUser;
        renderData();
    }

    function loadUserData() {
        const data = localStorage.getItem(`user_${currentUser}`);
        if (data) {
            userData = JSON.parse(data);
            document.getElementById('income-input').value = userData.income || '';
        }
    }

    function saveUserData() {
        localStorage.setItem(`user_${currentUser}`, JSON.stringify(userData));
    }

    function updateBudget() {
        const val = parseFloat(document.getElementById('income-input').value) || 0;
        userData.income = val;
        saveUserData();
        renderData();
    }

    function addExpense() {
        const nameInput = document.getElementById('item-name');
        const costInput = document.getElementById('item-cost');
        
        const name = nameInput.value.trim();
        const cost = parseFloat(costInput.value) || 0;

        if (!name || cost <= 0) {
            alert('يرجى إدخال اسم صنف ومبلغ صحيح');
            return;
        }

        // إدراج عنصر فريد مع معرف زمني لتسهيل الحذف الفردي
        userData.expenses.push({ id: Date.now(), name: name, cost: cost });
        saveUserData();
        renderData();

        nameInput.value = '';
        costInput.value = '';
    }

    // خاصية الحذف الجديدة
    function deleteExpense(id) {
        userData.expenses = userData.expenses.filter(item => item.id !== id);
        saveUserData();
        renderData();
    }

    function renderData() {
        const container = document.getElementById('expenses-container');
        container.innerHTML = '';
        let total = 0;

        userData.expenses.forEach(item => {
            total += item.cost;
            const li = document.createElement('li');
            li.className = 'expense-item';
            li.innerHTML = `
                <div class="expense-info">
                    <span class="expense-name">${item.name}</span>
                    <span class="expense-cost">(${item.cost})</span>
                </div>
                <button class="delete-btn" onclick="deleteExpense(${item.id})">حذف</button>
            `;
            container.appendChild(li);
        });

        const remaining = userData.income - total;
        document.getElementById('total-expenses').innerText = total;
        document.getElementById('remaining-budget').innerText = remaining;
    }

    function logout() {
        localStorage.removeItem('modern_curr_user');
        currentUser = null;
        document.getElementById('auth-screen').classList.remove('hidden');
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }
</script>

</body>
</html>
